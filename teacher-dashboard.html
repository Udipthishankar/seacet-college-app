<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard | SEA Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Poppins,sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#eef6ff,#fff7fb);
      color:#111827;
    }
    .wrap{
      width:min(1100px,92%);
      margin:auto;
      padding:28px 0 44px;
    }
    .topbar{
      background:rgba(255,255,255,.92);
      border:1px solid rgba(0,0,0,.06);
      border-radius:24px;
      padding:20px 22px;
      box-shadow:0 12px 34px rgba(0,0,0,.07);
      margin-bottom:18px;
    }
    .topbar h1{margin:0;font-size:clamp(1.8rem,3vw,2.6rem)}
    .topbar p{margin:8px 0 0;color:#6b7280;line-height:1.6}
    .section{
      background:rgba(255,255,255,.92);
      border:1px solid rgba(0,0,0,.06);
      border-radius:24px;
      padding:22px;
      box-shadow:0 12px 34px rgba(0,0,0,.07);
      margin-bottom:18px;
    }
    .section h2{
      margin:0 0 14px;
      font-size:1.2rem;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .section h2 i{color:#2563eb}
    .btn-group{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
    }
    .dash-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-width:200px;
      padding:14px 22px;
      border-radius:999px;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:#fff;
      text-decoration:none;
      font-weight:700;
      box-shadow:0 10px 24px rgba(37,99,235,.22);
      transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }
    .dash-btn:hover{
      transform:translateY(-3px);
      box-shadow:0 16px 30px rgba(37,99,235,.28);
      filter:saturate(1.05);
    }
    .dash-btn.secondary{
      background:linear-gradient(135deg,#0f766e,#14b8a6);
      box-shadow:0 10px 24px rgba(15,118,110,.22);
    }
    @media (max-width:640px){
      .dash-btn{width:100%; justify-content:center}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Teacher Dashboard</h1>
      <p>Manage classes and attendance from one clean place.</p>
    </div>

    <div class="section">
      <h2><i class="fa-solid fa-chalkboard"></i> Manage Classes</h2>
      <div class="btn-group">
        <a href="class-list.html" class="dash-btn"><i class="fa-solid fa-list"></i> View Class List</a>
        <a href="attendance-student.html" class="dash-btn secondary"><i class="fa-solid fa-clipboard-check"></i> Attendance</a>
      </div>
    </div>
  </div>
</body>
</html>

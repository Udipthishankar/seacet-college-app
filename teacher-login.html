<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Login | SEA Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Poppins,sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#eef6ff,#fff4f8);
      padding:20px;
    }
    .login-box{
      width:min(440px,100%);
      background:rgba(255,255,255,.94);
      border:1px solid rgba(0,0,0,.06);
      border-radius:26px;
      box-shadow:0 20px 60px rgba(0,0,0,.12);
      padding:34px 28px;
    }
    .logo{
      width:66px;
      height:66px;
      border-radius:18px;
      margin:0 auto 14px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#0f766e,#2563eb);
      color:#fff;
      font-size:1.6rem;
      font-weight:800;
    }
    h1{
      margin:0;
      text-align:center;
      font-size:2rem;
      color:#111827;
    }
    p{
      margin:8px 0 26px;
      text-align:center;
      color:#6b7280;
      font-size:.96rem;
    }
    .field{margin-bottom:16px}
    label{
      display:block;
      margin-bottom:8px;
      font-size:.95rem;
      font-weight:600;
      color:#374151;
    }
    input{
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid #d1d5db;
      outline:none;
      font-size:1rem;
      background:#fff;
    }
    input:focus{
      border-color:#0f766e;
      box-shadow:0 0 0 4px rgba(15,118,110,.12);
    }
    .actions{margin-top:22px}
    button{
      width:100%;
      border:none;
      border-radius:999px;
      padding:14px 16px;
      font-size:1rem;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg,#0f766e,#2563eb);
      cursor:pointer;
      box-shadow:0 10px 24px rgba(15,118,110,.22);
      transition:transform .2s ease, box-shadow .2s ease;
    }
    button:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 30px rgba(15,118,110,.28);
    }
    .small{
      margin-top:16px;
      text-align:center;
      font-size:.92rem;
      color:#6b7280;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo"><i class="fa-solid fa-chalkboard-user"></i></div>
    <h1>Teacher Login</h1>
    <p>Sign in to manage classes and attendance</p>

    <form action="teacher-dashboard.html" method="get">
      <div class="field">
        <label for="username">Teacher ID / Username</label>
        <input type="text" id="username" name="username" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="actions">
        <button type="submit">Login</button>
      </div>
    </form>

    <div class="small">After login, go to the teacher dashboard.</div>
  </div>
</body>
</html>
